<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --x-color: #ff3c6e;
    --o-color: #00e5ff;
    --x-glow: rgba(255,60,110,0.4);
    --o-glow: rgba(0,229,255,0.4);
    --text: #e8e8f0;
    --muted: #555570;
    --win-bg: #1a1a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,60,110,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridShift 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridShift {
    0% { transform: translate(0,0); }
    100% { transform: translate(40px, 40px); }
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 20px;
  }

  .title {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    letter-spacing: 0.12em;
    background: linear-gradient(90deg, var(--x-color), var(--o-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(0,229,255,0.2));
  }

  /* Score board */
  .scoreboard {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 22px;
    text-align: center;
    min-width: 80px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .score-card.active-x { border-color: var(--x-color); box-shadow: 0 0 12px var(--x-glow); }
  .score-card.active-o { border-color: var(--o-color); box-shadow: 0 0 12px var(--o-glow); }

  .score-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .score-label.x { color: var(--x-color); }
  .score-label.o { color: var(--o-color); }

  .score-value {
    font-family: 'Bebas Neue', cursive;
    font-size: 2rem;
    letter-spacing: 0.05em;
    line-height: 1.1;
  }

  .score-divider {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Status */
  .status {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    height: 20px;
    transition: color 0.3s;
  }

  .status.x-turn { color: var(--x-color); }
  .status.o-turn { color: var(--o-color); }
  .status.winner { color: #ffd700; font-weight: 700; }

  /* Board */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 8px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    position: relative;
  }

  .cell {
    width: clamp(85px, 22vw, 120px);
    height: clamp(85px, 22vw, 120px);
    background: var(--surface);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2.5rem, 9vw, 3.8rem);
    transition: background 0.15s, transform 0.1s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .cell:hover:not(.taken) {
    background: #1a1a26;
    transform: scale(0.97);
  }

  .cell:hover:not(.taken)::before {
    opacity: 1;
    background: radial-gradient(circle, rgba(255,255,255,0.04), transparent 70%);
  }

  .cell.x {
    color: var(--x-color);
    text-shadow: 0 0 20px var(--x-glow);
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }

  .cell.o {
    color: var(--o-color);
    text-shadow: 0 0 20px var(--o-glow);
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }

  .cell.win-cell.x {
    background: rgba(255,60,110,0.12);
    box-shadow: inset 0 0 20px rgba(255,60,110,0.15);
    animation: winPulse 1s ease-in-out infinite;
  }

  .cell.win-cell.o {
    background: rgba(0,229,255,0.12);
    box-shadow: inset 0 0 20px rgba(0,229,255,0.15);
    animation: winPulseO 1s ease-in-out infinite;
  }

  @keyframes popIn {
    0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  @keyframes winPulse {
    0%, 100% { box-shadow: inset 0 0 20px rgba(255,60,110,0.15), 0 0 0 rgba(255,60,110,0); }
    50% { box-shadow: inset 0 0 30px rgba(255,60,110,0.3), 0 0 20px rgba(255,60,110,0.2); }
  }

  @keyframes winPulseO {
    0%, 100% { box-shadow: inset 0 0 20px rgba(0,229,255,0.15), 0 0 0 rgba(0,229,255,0); }
    50% { box-shadow: inset 0 0 30px rgba(0,229,255,0.3), 0 0 20px rgba(0,229,255,0.2); }
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 12px;
  }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover {
    border-color: var(--o-color);
    color: var(--o-color);
    box-shadow: 0 0 12px var(--o-glow);
  }

  .btn.reset:hover {
    border-color: var(--x-color);
    color: var(--x-color);
    box-shadow: 0 0 12px var(--x-glow);
  }

  /* Draw overlay */
  .draw-banner {
    position: absolute;
    inset: 0;
    background: rgba(10,10,15,0.85);
    border-radius: 14px;
    display: none;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', cursive;
    font-size: 2.5rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    backdrop-filter: blur(4px);
    animation: fadeIn 0.3s ease;
  }

  .draw-banner.show { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="title">TIC TAC TOE</div>

  <div class="scoreboard">
    <div class="score-card" id="scoreX">
      <div class="score-label x">Player X</div>
      <div class="score-value" id="xVal">0</div>
    </div>
    <div class="score-divider">VS</div>
    <div class="score-card" id="scoreO">
      <div class="score-label o">Player O</div>
      <div class="score-value" id="oVal">0</div>
    </div>
  </div>

  <div class="status x-turn" id="status">X's turn</div>

  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
    <div class="draw-banner" id="drawBanner">DRAW!</div>
  </div>

  <div class="btn-row">
    <button class="btn reset" id="resetBtn">↺ New Game</button>
    <button class="btn" id="clearBtn">Clear Scores</button>
  </div>
</div>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let board = Array(9).fill('');
  let current = 'X';
  let gameOver = false;
  let scores = { X: 0, O: 0 };

  const cells = document.querySelectorAll('.cell');
  const statusEl = document.getElementById('status');
  const xVal = document.getElementById('xVal');
  const oVal = document.getElementById('oVal');
  const scoreX = document.getElementById('scoreX');
  const scoreO = document.getElementById('scoreO');
  const drawBanner = document.getElementById('drawBanner');

  function updateStatus() {
    if (!gameOver) {
      statusEl.textContent = `${current}'s turn`;
      statusEl.className = `status ${current === 'X' ? 'x-turn' : 'o-turn'}`;
      scoreX.className = `score-card${current === 'X' ? ' active-x' : ''}`;
      scoreO.className = `score-card${current === 'O' ? ' active-o' : ''}`;
    }
  }

  function checkWin() {
    for (const [a,b,c] of WINS) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return [a,b,c];
      }
    }
    return null;
  }

  function handleClick(e) {
    const cell = e.currentTarget;
    const i = +cell.dataset.i;
    if (gameOver || board[i]) return;

    board[i] = current;
    cell.textContent = current;
    cell.classList.add('taken', current.toLowerCase());

    const win = checkWin();
    if (win) {
      gameOver = true;
      scores[current]++;
      xVal.textContent = scores.X;
      oVal.textContent = scores.O;
      win.forEach(idx => cells[idx].classList.add('win-cell'));
      statusEl.textContent = `${current} WINS!`;
      statusEl.className = 'status winner';
      scoreX.className = 'score-card';
      scoreO.className = 'score-card';
    } else if (board.every(Boolean)) {
      gameOver = true;
      drawBanner.classList.add('show');
      statusEl.textContent = "It's a draw!";
      statusEl.className = 'status';
    } else {
      current = current === 'X' ? 'O' : 'X';
      updateStatus();
    }
  }

  function resetGame() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    drawBanner.classList.remove('show');
    cells.forEach(cell => {
      cell.textContent = '';
      cell.className = 'cell';
    });
    updateStatus();
  }

  cells.forEach(c => c.addEventListener('click', handleClick));
  document.getElementById('resetBtn').addEventListener('click', resetGame);
  document.getElementById('clearBtn').addEventListener('click', () => {
    scores = { X: 0, O: 0 };
    xVal.textContent = 0;
    oVal.textContent = 0;
    resetGame();
  });

  updateStatus();
</script>
</body>
</html>
